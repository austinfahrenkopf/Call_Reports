# CI for austinfahrenkopf/Call_Reports
#
# What this checks:
#   0. Root allowlist (cycle-15 ROOT DIET): the repo root carries ONLY the fixed entry set.
#   1. reproduce/tools/validate_build_call.py runs against the COMMITTED app/ + reproduce/ files.
#      Kit layout since v1.0.2 ROOT DIET: scripts in reproduce/tools/, data+config in
#      reproduce/config/ (incl. ffiec_call_tool.parquet, expected_items.json), blank PDFs in
#      reproduce/forms/, docs in reproduce/docs/. The validator resolves inputs from the CURRENT
#      DIRECTORY (byte-identical copy of the workshop original), so the step runs with
#      working-directory: reproduce/config; it imports _completeness_gate/hierarchy_linter from
#      its own script directory (reproduce/tools/ is on sys.path). The step is best-effort
#      (continue-on-error) because the validator also checks the built site tree, which mirrors
#      the dev working-dir layout rather than this repo's app/ layout.
#   2. An independent inline golden-cell assertion (does not depend on validate_build_call.py or
#      on _completeness_gate.py) — this is the check that must never silently skip, and it is
#      the authoritative pass/fail gate for this job.
#
# A failing badge on the golden-cell step means: do not trust this repo's HEAD.

name: Call Reports validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # reproduce/requirements.txt carries >= FLOOR specifiers, not exact pins (C15.1 comment
        # truth-fix; exact pinning is an open decision - AQ-C15-1). The clean-room verification
        # record lives at reproduce/docs/REPRODUCE_VERIFIED.md (Python 3.12).
        run: |
          python -m pip install --upgrade pip
          pip install -r reproduce/requirements.txt

      - name: Root allowlist (cycle-15 ROOT DIET — a stray root file fails CI)
        run: |
          python - <<'PY'
          import os, sys
          allowed = {"README.md","GLOSSARY.md","LICENSE","index.html","app","reproduce",
                     ".git",".github",".gitignore",".nojekyll"}
          strays = sorted(e for e in os.listdir(".") if e not in allowed)
          for s in strays:
              print(f"::error::root entry {s!r} is not in the cycle-15 root allowlist — place it under reproduce/ or amend the allowlist deliberately")
          sys.exit(1 if strays else 0)
          PY

      - name: Repo layout sanity check
        # Call_Reports uses the app/ layout (root index.html redirect + app/index.html +
        # app/ffiec_call_recent_*.parquet + app/ffiec_call_old_*.parquet era shards).
        run: |
          test -f reproduce/tools/make_site_call.py || { echo "::error::reproduce/tools/make_site_call.py not found — engine missing or repo layout changed"; exit 1; }
          test -d app || { echo "::error::app/ directory not found — expected committed parquet/hierarchy under app/"; exit 1; }
          echo "Layout OK: reproduce/tools/make_site_call.py + app/ present"

      - name: Run validate_build_call.py (best-effort; site-tree checks may not apply to repo layout)
        id: validator
        working-directory: reproduce/config
        continue-on-error: true
        run: |
          python ../tools/validate_build_call.py

      - name: Report validator outcome
        run: |
          if [ "${{ steps.validator.outcome }}" != "success" ]; then
            echo "::warning::validate_build_call.py did not pass. Its site-tree checks mirror the dev working-dir layout, not this repo's app/ layout, so a failure here is not by itself a data problem. The golden-cell assertion below is the authoritative gate for this job."
          fi

      - name: Golden-cell assertion (authoritative — independent of validate_build_call.py)
        # The repo ships era SHARDS: app/ffiec_call_recent_2018_<yr>.parquet (golden lives here)
        # + app/ffiec_call_old_1976_2017.parquet. Schema (verified against the committed shard
        # 2026-07-03): entity_id ("BANK:<rssd>"), quarter_end, mdrm, value.
        run: |
          python - <<'PY'
          import sys, glob
          import pandas as pd

          cands = sorted(glob.glob("app/ffiec_call_recent_*.parquet"))
          if not cands:
              print("::error::no app/ffiec_call_recent_*.parquet shard found — layout drifted, update this assertion")
              sys.exit(1)
          PARQUET = cands[-1]
          GOLDEN_RSSD = 852218   # JPMorgan Chase Bank, N.A.
          GOLDEN_CODES = ("RCFD2170", "RCON2170")
          GOLDEN_QUARTER = "2026-03-31"
          GOLDEN_VALUE = 4_016_571_000

          df = pd.read_parquet(PARQUET)
          print("columns:", list(df.columns))

          entity_col = "entity_id" if "entity_id" in df.columns else None
          if entity_col is None:
              print(f"::error::expected an entity_id column (format 'BANK:<rssd>') not found in {PARQUET} — schema drifted, update this assertion")
              sys.exit(1)

          jpm_id = f"BANK:{GOLDEN_RSSD}"
          mask = (
              (df[entity_col] == jpm_id)
              & (df["mdrm"].isin(GOLDEN_CODES))
              & (df["quarter_end"].astype(str) == GOLDEN_QUARTER)
          )
          hit = df[mask]
          if hit.empty:
              print(f"::error::golden cell not found: {jpm_id} {GOLDEN_CODES} @ {GOLDEN_QUARTER} in {PARQUET}")
              sys.exit(1)

          got = int(hit["value"].max())
          print(f"golden cell: {jpm_id} {GOLDEN_CODES} @ {GOLDEN_QUARTER} = {got:,} (expected {GOLDEN_VALUE:,})")
          if got != GOLDEN_VALUE:
              print(f"::error::GOLDEN CELL MISMATCH — got {got:,}, expected {GOLDEN_VALUE:,}. Do not trust this build.")
              sys.exit(1)

          print("GOLDEN CELL OK")
          PY
